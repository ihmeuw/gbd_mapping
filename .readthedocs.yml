# This is the archived gbd_mapping repo. The "latest" build now produces a
# single landing page pointing at vivarium-gbd-mapping (see
# docs/source/index.rst). Older tagged versions still build their original
# conf.py via the version selector.
version: 2

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true

build:
  os: ubuntu-22.04
  tools:
    python: "3.13"

python:
  install:
    - requirements: docs/requirements.txt
